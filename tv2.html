<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="300" />
  <title>Menu – TV 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      max-width: 100%;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <img src="images/menu-tv2.png" alt="Menu TV 2" />

  <script>
    // Reload every 5 minutes to pick up any menu updates
    setTimeout(() => location.reload(true), 5 * 60 * 1000);

    // If image fails to load, retry after 30 seconds
    document.querySelector('img').onerror = function() {
      setTimeout(() => location.reload(true), 30 * 1000);
    };
  </script>
</body>
</html>
