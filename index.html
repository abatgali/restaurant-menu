<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Menu – TV Shortcuts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      gap: 40px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #aaa;
      text-transform: uppercase;
    }

    .cards {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 48px 64px;
      color: #fff;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      min-width: 220px;
    }

    a.card:hover {
      background: #252525;
      border-color: #555;
      transform: translateY(-3px);
    }

    a.card .icon {
      font-size: 3rem;
    }

    a.card .label {
      font-size: 1.25rem;
      font-weight: 600;
    }

    a.card .sub {
      font-size: 0.85rem;
      color: #777;
    }

    footer {
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>

  <h1>Restaurant Menu TVs</h1>

  <div class="cards">
    <a class="card" href="tv1.html">
      <span class="icon">📺</span>
      <span class="label">TV 1</span>
      <span class="sub">Menu Display</span>
    </a>
    <a class="card" href="tv2.html">
      <span class="icon">📺</span>
      <span class="label">TV 2</span>
      <span class="sub">Menu Display</span>
    </a>
  </div>
</body>
</html>
